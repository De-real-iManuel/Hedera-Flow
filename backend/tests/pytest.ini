[tool:pytest]
# Pytest configuration for Hedera-Flow backend tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# Test markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for service interactions  
    e2e: End-to-end workflow tests
    manual: Manual testing scripts
    slow: Tests that take more than 5 seconds
    external: Tests that require external services
    mock: Tests using mock services only
    hedera: Tests involving Hedera SDK
    database: Tests requiring database connection
    api: API endpoint tests
    auth: Authentication related tests
    payment: Payment flow tests
    ocr: OCR and image processing tests
    fraud: Fraud detection tests

# Test filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:google.*
    ignore::UserWarning:jnius.*

# Minimum version
minversion = 6.0

# Test timeout (in seconds)
timeout = 300

# Parallel execution
# addopts = -n auto  # Uncomment to enable parallel testing

# Coverage configuration (when using pytest-cov)
# addopts = --cov=app --cov-report=html --cov-report=term-missing --cov-fail-under=80