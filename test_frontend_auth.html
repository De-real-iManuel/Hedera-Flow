<!DOCTYPE html>
<html>
<head>
    <title>Frontend Auth Test</title>
</head>
<body>
    <h1>Frontend Authentication Test</h1>
    <div id="status">Testing...</div>
    <div id="results"></div>

    <script>
        async function testAuth() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            try {
                // Step 1: Login
                statusDiv.innerHTML = 'Step 1: Logging in...';
                
                const loginData = new URLSearchParams();
                loginData.append('username', 'test@hederaflow.com');
                loginData.append('password', 'testpass123');
                
                const loginResponse = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Origin': 'http://localhost:8080'
                    },
                    body: loginData
                });
                
                if (!loginResponse.ok) {
                    throw new Error(`Login failed: ${loginResponse.status}`);
                }
                
                const loginResult = await loginResponse.json();
                resultsDiv.innerHTML += `<p>✅ Login successful: ${loginResult.user.email}</p>`;
                
                // Step 2: Test Bills API
                statusDiv.innerHTML = 'Step 2: Testing Bills API...';
                
                const billsResponse = await fetch('http://localhost:8000/api/bills', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${loginResult.token}`,
                        'Content-Type': 'application/json',
                        'Origin': 'http://localhost:8080'
                    }
                });
                
                if (!billsResponse.ok) {
                    throw new Error(`Bills API failed: ${billsResponse.status}`);
                }
                
                const billsResult = await billsResponse.json();
                resultsDiv.innerHTML += `<p>✅ Bills API successful: Found ${billsResult.length} bills</p>`;
                
                // Step 3: Test CORS headers
                statusDiv.innerHTML = 'Step 3: Checking CORS headers...';
                
                const corsHeaders = {
                    'Access-Control-Allow-Origin': billsResponse.headers.get('Access-Control-Allow-Origin'),
                    'Access-Control-Allow-Credentials': billsResponse.headers.get('Access-Control-Allow-Credentials')
                };
                
                resultsDiv.innerHTML += `<p>✅ CORS Headers:</p>`;
                resultsDiv.innerHTML += `<ul>`;
                for (const [header, value] of Object.entries(corsHeaders)) {
                    resultsDiv.innerHTML += `<li>${header}: ${value || 'Missing'}</li>`;
                }
                resultsDiv.innerHTML += `</ul>`;
                
                statusDiv.innerHTML = '✅ All tests passed! Frontend can communicate with backend.';
                
            } catch (error) {
                statusDiv.innerHTML = `❌ Test failed: ${error.message}`;
                resultsDiv.innerHTML += `<p>❌ Error: ${error.message}</p>`;
            }
        }
        
        // Run test when page loads
        testAuth();
    </script>
</body>
</html>
