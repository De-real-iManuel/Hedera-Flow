<!DOCTYPE html>
<html>
<head>
    <title>Hedera Address Conversion Test</title>
</head>
<body>
    <h1>Hedera Account ID to EVM Address Conversion</h1>
    <div>
        <label>Hedera Account ID: </label>
        <input type="text" id="accountId" value="0.0.7942957" />
        <button onclick="convert()">Convert</button>
    </div>
    <div id="result"></div>

    <script>
        function convert() {
            const accountId = document.getElementById('accountId').value;
            
            if (!accountId.startsWith('0.0.')) {
                document.getElementById('result').innerHTML = '<p style="color: red;">Invalid format. Use 0.0.X format</p>';
                return;
            }

            // Extract the account number
            const accountNum = BigInt(accountId.split('.')[2]);
            
            // Convert to EVM address (20 bytes = 40 hex chars)
            const evmAddress = '0x' + accountNum.toString(16).padStart(40, '0');
            
            document.getElementById('result').innerHTML = `
                <h3>Results:</h3>
                <p><strong>Hedera Account ID:</strong> ${accountId}</p>
                <p><strong>Account Number:</strong> ${accountNum}</p>
                <p><strong>EVM Address:</strong> ${evmAddress}</p>
                <p><strong>Hex Value:</strong> ${accountNum.toString(16)}</p>
            `;
        }

        // Auto-convert on load
        convert();
    </script>
</body>
</html>
