name: hedera-flow
services:
- name: backend
  source_dir: /backend
  github:
    repo: De-real-iManuel/Hedera-Flow
    branch: main
  run_command: uvicorn app.core.app:app --host 0.0.0.0 --port $PORT
  environment_slug: python
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    type: SECRET
  - key: REDIS_URL  
    scope: RUN_TIME
    type: SECRET
  - key: HEDERA_ACCOUNT_ID
    scope: RUN_TIME
    type: SECRET
  - key: HEDERA_PRIVATE_KEY
    scope: RUN_TIME
    type: SECRET
  - key: JWT_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: HEDERA_NETWORK
    value: testnet
  - key: ENVIRONMENT
    value: production

databases:
- name: hedera-flow-db
  engine: PG
  version: "14"
  size: basic-xs